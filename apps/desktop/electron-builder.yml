appId: dev.nekkolabs.openpaw
productName: Open Paw
copyright: Copyright © 2026 Nekko Labs
afterPack: scripts/after-pack.cjs
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
publish:
  provider: github
  owner: nekko-labs
  repo: open-paw
win:
  target:
    - msi
    - nsis
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  # Add/Remove Programs + Start Menu uninstall entry, with a Start Menu folder.
  menuCategory: true
  createStartMenuShortcut: true
  uninstallDisplayName: Open Paw
  # Custom uninstall hook lives at build/installer.nsh — electron-builder picks
  # it up automatically (its customUnInstall macro offers to remove user data).
msi:
  oneClick: false
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
  # No Apple Developer ID yet → can't notarize. Ad-hoc signing happens in the
  # afterPack hook so the (unsigned) app still launches on Apple Silicon.
  hardenedRuntime: false
  gatekeeperAssess: false
linux:
  target:
    - AppImage
    - deb
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}
